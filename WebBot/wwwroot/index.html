<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebBot</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WebBot.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.TelegramWebApp = {
            ready: function() {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }
            },
            close: function() {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.close();
                }
            },
            getInitData: function() {
                if (window.Telegram && window.Telegram.WebApp) {
                    return window.Telegram.WebApp.initDataUnsafe || {};
                }
                return {};
            },
            sendData: function(data) {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(data);
                }
            },
            showBackButton: function(show) {
                if (window.Telegram && window.Telegram.WebApp) {
                    if (show) {
                        window.Telegram.WebApp.BackButton.show();
                        window.Telegram.WebApp.BackButton.onClick(function() {
                            window.history.back();
                        });
                    } else {
                        window.Telegram.WebApp.BackButton.hide();
                    }
                }
            },
            showMainButton: function(text, color) {
                if (window.Telegram && window.Telegram.WebApp) {
                    var btn = window.Telegram.WebApp.MainButton;
                    btn.setText(text);
                    if (color) btn.setColor(color);
                    btn.show();
                    return {
                        onClick: function(callback) { btn.onClick(callback); },
                        offClick: function(callback) { btn.offClick(callback); },
                        hide: function() { btn.hide(); },
                        showProgress: function() { btn.showProgress(true); },
                        hideProgress: function() { btn.hideProgress(); }
                    };
                }
                return null;
            },
            getUser: function() {
                if (window.Telegram && window.Telegram.WebApp) {
                    return window.Telegram.WebApp.initDataUnsafe.user || null;
                }
                return null;
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
